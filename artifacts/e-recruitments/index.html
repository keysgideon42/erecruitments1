<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->

    <meta name="description" content="Discover 1,850+ UN, NGO and INGO career opportunities across 190+ countries. Browse international development, humanitarian, and peacekeeping jobs from 120+ top global organizations." />
    <meta name="keywords" content="UN jobs, NGO jobs, INGO jobs, international development jobs, humanitarian jobs, United Nations careers, UNICEF jobs, UNDP jobs, WHO jobs, peacekeeping jobs, international organizations, global careers" />
    <meta name="author" content="E-RECRUITMENTS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://erecruitments1.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://erecruitments1.vercel.app/" />

    <meta property="og:description" content="Discover 1,850+ UN, NGO and INGO career opportunities across 190+ countries. The world's leading platform for international development careers." />
    <meta property="og:image" content="https://erecruitments1.vercel.app/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="E-RECRUITMENTS — UN, NGO & INGO Jobs Worldwide" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://erecruitments1.vercel.app/opengraph.jpg" />

    <!-- Theme & App -->
    <meta name="theme-color" content="#0f2744" />
    <meta name="application-name" content="E-RECRUITMENTS" />
    <meta name="msapplication-TileColor" content="#0f2744" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "E-RECRUITMENTS",
      "url": "https://erecruitments1.vercel.app",
      "description": "The leading platform for UN, NGO, and INGO career opportunities worldwide.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://erecruitments1.vercel.app/jobs?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",

    }
